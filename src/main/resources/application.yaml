spring:
  application:
    name: hiring-homework
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: username
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  artemis:
    mode: native
    broker-url: tcp://localhost:61616
    user: artemis
    password: password

logging:
  level:
    com.adam.hiring: DEBUG

exchange-rate-api:
  url: http://localhost:8081/api

resilience4j:
  retry:
    instances:
      exchangeRetry:
        maxAttempts: 10
        waitDuration: 10s
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException$ServiceUnavailable